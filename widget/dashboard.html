<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI ATC — Flight Dashboard</title>
<style>
  :root { --accent:#6f8cff; --g1:#2fb6ff; --g2:#9b5cff; --bg:#070b12; --panel:#0f1a26; --panel2:#13202f; --line:#1d2c3c; --ink:#e7eef6; --dim:#7d93a8; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink); font:14px/1.5 "Segoe UI",system-ui,sans-serif; overflow:hidden; }
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#243749;border-radius:8px}
  header { display:flex; align-items:center; gap:14px; padding:14px 22px; border-bottom:1px solid var(--line);
    background:linear-gradient(90deg, rgba(47,182,255,.14), rgba(155,92,255,.08)); }
  header h1 { margin:0; font-size:18px; font-weight:800; letter-spacing:.3px; }
  header h1 .code { font-family:ui-monospace,Consolas,monospace; background:#0d1722; border:1px solid var(--line); padding:2px 8px; border-radius:7px; }
  header .cs { margin-left:auto; color:var(--dim); font-family:ui-monospace,Consolas,monospace; display:flex; align-items:center; gap:8px; }
  .live-dot { width:9px; height:9px; border-radius:50%; background:#445; display:inline-block; }
  .live-dot.on { background:#43d17a; box-shadow:0 0 0 0 rgba(67,209,122,.6); animation:p 1.4s infinite; }
  @keyframes p { 0%{box-shadow:0 0 0 0 rgba(67,209,122,.5)} 70%{box-shadow:0 0 0 8px rgba(67,209,122,0)} 100%{box-shadow:0 0 0 0 rgba(67,209,122,0)} }

  .layout { display:grid; grid-template-columns:300px 1fr 360px; height:calc(100% - 57px); }
  .side { padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }
  .side.left { border-right:1px solid var(--line); }
  .side.right { border-left:1px solid var(--line); }
  #globeWrap { position:relative; background:radial-gradient(circle at 50% 35%, #101f31, #05080d 72%); }
  #globe { width:100%; height:100%; }
  .globe-hint { position:absolute; bottom:12px; left:0; right:0; text-align:center; font-size:11px; color:var(--dim); pointer-events:none; letter-spacing:.3px; }

  .cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .card { background:linear-gradient(160deg,var(--panel2),var(--panel)); border:1px solid var(--line); border-radius:13px; padding:13px 15px; }
  .card .k { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--dim); }
  .card .v { font-size:25px; font-weight:800; margin-top:3px; background:linear-gradient(135deg,var(--g1),var(--g2)); -webkit-background-clip:text; background-clip:text; color:transparent; }

  .sect { background:var(--panel); border:1px solid var(--line); border-radius:13px; overflow:hidden; }
  .sect h2 { margin:0; padding:11px 15px; font-size:12px; text-transform:uppercase; letter-spacing:.7px; color:#9fd0ff; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  .routes,.flist { list-style:none; margin:0; padding:0; }
  .routes li { display:flex; justify-content:space-between; align-items:center; padding:9px 15px; border-bottom:1px solid var(--line); font-size:13px; cursor:pointer; transition:background .12s; }
  .routes li:last-child,.flist li:last-child { border-bottom:0; }
  .routes li:hover { background:rgba(111,140,255,.10); }
  .routes .route { font-family:ui-monospace,Consolas,monospace; font-weight:600; }
  .routes .bar { height:5px; border-radius:4px; background:linear-gradient(90deg,var(--g1),var(--g2)); margin-top:4px; }
  .routes .ct { color:var(--dim); font-size:12px; }

  .flist li { padding:10px 15px; border-bottom:1px solid var(--line); cursor:pointer; display:flex; align-items:center; gap:9px; transition:background .12s; }
  .flist li:hover, .flist li.sel { background:rgba(111,140,255,.12); }
  .flist li.sel { box-shadow:inset 3px 0 0 var(--accent); }
  .flist .cs2 { font-weight:800; min-width:58px; font-size:13px; }
  .flist .rt2 { font-family:ui-monospace,Consolas,monospace; font-size:12px; color:var(--dim); flex:1; }
  .badge { font-size:11px; font-weight:800; padding:2px 8px; border-radius:20px; }
  .badge.good { color:#43d17a; background:rgba(67,209,122,.14); }
  .badge.mid { color:#e0a14a; background:rgba(224,161,74,.14); }
  .badge.bad { color:#ff6b6b; background:rgba(255,107,107,.14); }

  .detail { background:linear-gradient(160deg,var(--panel2),var(--panel)); border:1px solid var(--accent); border-radius:13px; overflow:hidden; box-shadow:0 6px 30px rgba(47,182,255,.10); }
  .detail .dh { padding:13px 16px; background:linear-gradient(90deg, rgba(47,182,255,.16), rgba(155,92,255,.10)); border-bottom:1px solid var(--line); }
  .detail .dh .t { font-size:17px; font-weight:800; }
  .detail .dh .s { font-family:ui-monospace,Consolas,monospace; color:#9fd0ff; font-size:13px; margin-top:2px; }
  .detail .body { padding:6px 16px 14px; }
  .detail .row { display:flex; justify-content:space-between; gap:10px; padding:7px 0; font-size:13px; border-bottom:1px solid var(--line); }
  .detail .row:last-child { border-bottom:0; }
  .detail .row .l { color:var(--dim); }
  .detail .row .r { font-family:ui-monospace,Consolas,monospace; text-align:right; }
  .detail .route-box { margin:8px 0 2px; padding:9px 11px; background:#0b1420; border:1px solid var(--line); border-radius:9px; font-family:ui-monospace,Consolas,monospace; font-size:12px; color:#bcd4ec; word-break:break-word; }
  .detail .close { float:right; cursor:pointer; color:var(--dim); font-size:18px; line-height:1; }

  .livebar { font-size:12px; color:var(--dim); padding:12px 15px; }
  .livebar b { color:var(--ink); font-family:ui-monospace,Consolas,monospace; }
  .empty { padding:18px 15px; color:var(--dim); text-align:center; font-size:13px; }
  .emoji { font-size:13px; }
  @media (max-width:1000px){ .layout { grid-template-columns:1fr; grid-auto-rows:min-content; height:auto; overflow:auto; } #globeWrap{height:60vh;} html,body{overflow:auto;} }
</style>
</head>
<body>
  <header>
    <h1>AI <span class="code">ATC</span> Flight Dashboard</h1>
    <span class="cs"><span class="live-dot" id="dot"></span> <span id="cs">—</span></span>
  </header>

  <div class="layout">
    <div class="side left">
      <div class="cards">
        <div class="card"><div class="k">Total flights</div><div class="v" id="s-flights">—</div></div>
        <div class="card"><div class="k">Airports</div><div class="v" id="s-airports">—</div></div>
        <div class="card"><div class="k">Avg readback</div><div class="v" id="s-acc">—</div></div>
        <div class="card"><div class="k">Emergencies</div><div class="v" id="s-emerg">—</div></div>
      </div>
      <div class="sect">
        <h2>Live flight <span class="live-dot" id="dot2"></span></h2>
        <div class="livebar" id="livebar">No active flight.</div>
      </div>
      <div class="sect">
        <h2>Top routes</h2>
        <ul class="routes" id="routes"><li class="empty">No flights yet.</li></ul>
      </div>
    </div>

    <div id="globeWrap">
      <div id="globe"></div>
      <div class="globe-hint">drag to rotate · scroll to zoom · click a route for flight details</div>
    </div>

    <div class="side right">
      <div class="detail" id="detail" style="display:none;"></div>
      <div class="sect">
        <h2>Flight log</h2>
        <ul class="flist" id="recent"><li class="empty">No flights logged yet.</li></ul>
      </div>
    </div>
  </div>

<script src="/lib/three.min.js"></script>
<script>if (typeof THREE === 'undefined') document.write('<script src="https://unpkg.com/three@0.158.0/build/three.min.js"><\/script>');</script>
<script src="/lib/globe.gl.min.js"></script>
<script>if (typeof Globe === 'undefined') document.write('<script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"><\/script>');</script>
<script>
var $ = function(id){ return document.getElementById(id); };
var APT = { KSEA:[47.449,-122.309], KPDX:[45.589,-122.597], KLAX:[33.942,-118.408], KSLE:[44.909,-123.003] };
var globe, flights = [], selectedKey = null, coordMap = {};

function aptLL(icao){ if(!icao) return null; var k=String(icao).toUpperCase(); return coordMap[k] || APT[k] || null; }
function accClass(a){ return a>=90?'good':a>=70?'mid':'bad'; }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
function whenStr(iso){ if(!iso) return ''; try{ var d=new Date(iso); return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }catch(e){ return ''; } }
function flightKey(f,i){ return (f.callsign||'')+'|'+(f.origin||'')+'|'+(f.destination||'')+'|'+i; }

function initGlobe(){
  globe = Globe()(document.getElementById('globe'))
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundColor('rgba(0,0,0,0)')
    .atmosphereColor('#4aa8ff').atmosphereAltitude(0.25)
    .arcColor(function(d){ return d.__sel ? ['#39e9ff','#c98bff'] : ['#2fb6ff','#9b5cff']; })
    .arcStroke(function(d){ return d.__sel ? 1.8 : 0.85; })
    .arcAltitudeAutoScale(0.5)
    .arcsTransitionDuration(0)
    .onArcClick(function(d){ selectFlight(d.__key); })
    .pointColor(function(){ return '#43ffb0'; })
    .pointAltitude(0.012).pointRadius(function(d){ return d.__sel?0.7:0.42; })
    .labelText('icao').labelSize(1.15).labelColor(function(){return '#eaf4ff';})
    .labelDotRadius(0.34).labelDotOrientation(function(){return 'bottom';}).labelAltitude(0.015);
  function size(){ var w=$('globeWrap'); globe.width(w.clientWidth).height(w.clientHeight); }
  size(); window.addEventListener('resize', size);
  globe.controls().autoRotate = true; globe.controls().autoRotateSpeed = 0.3;
  globe.pointOfView({ lat: 30, lng: -100, altitude: 2.2 });
}

function rebuildGlobe(){
  if(!globe) return;
  var arcs = [], ptsMap = {};
  flights.forEach(function(f, i){
    var o = aptLL(f.origin), d = aptLL(f.destination); var k = flightKey(f,i);
    var sel = (k===selectedKey);
    if(o){ ptsMap[f.origin] = { icao:f.origin, lat:o[0], lng:o[1], __sel:(ptsMap[f.origin]&&ptsMap[f.origin].__sel)||sel }; }
    if(d){ ptsMap[f.destination] = { icao:f.destination, lat:d[0], lng:d[1], __sel:(ptsMap[f.destination]&&ptsMap[f.destination].__sel)||sel }; }
    if(o && d){ arcs.push({ startLat:o[0], startLng:o[1], endLat:d[0], endLng:d[1], __key:k, __sel:sel, __f:f }); }
  });
  // draw selected arc last so it renders on top
  arcs.sort(function(a,b){ return (a.__sel?1:0)-(b.__sel?1:0); });
  globe.arcsData(arcs).pointsData(Object.values(ptsMap)).labelsData(Object.values(ptsMap));
}

function detailHTML(f){
  var acc = f.readbackAccuracy;
  var rb = (f.readbacksCorrect!=null && f.readbacksExpected!=null) ? f.readbacksCorrect+' / '+f.readbacksExpected : '—';
  var rows = [
    ['Aircraft', f.aircraft || '—'],
    ['Flight rules', f.flightRules || '—'],
    ['Cruise', f.cruiseAltitudeFt ? (f.cruiseAltitudeFt.toLocaleString()+' ft') : '—'],
    ['Readback accuracy', '<span class="badge '+accClass(acc||0)+'">'+(acc!=null?acc+'%':'n/a')+'</span>'],
    ['Readbacks', rb],
    ['Emergency', f.declaredEmergency ? '⚠️ declared' : '—'],
    ['Logged', whenStr(f.savedAt) || '—'],
  ];
  return '<div class="dh"><span class="close" onclick="clearSel()">×</span>'+
      '<div class="t">'+esc(f.callsign||'Flight')+'</div>'+
      '<div class="s">'+esc(f.origin)+' &#8594; '+esc(f.destination)+'</div></div>'+
    '<div class="body">'+
      rows.map(function(r){ return '<div class="row"><span class="l">'+r[0]+'</span><span class="r">'+r[1]+'</span></div>'; }).join('')+
      (f.route ? '<div class="route-box"><span style="color:var(--dim)">ROUTE&nbsp;</span>'+esc(f.route)+'</div>' : '')+
    '</div>';
}

function clearSel(){ selectedKey=null; $('detail').style.display='none'; Array.prototype.forEach.call(document.querySelectorAll('#recent li'),function(li){li.classList.remove('sel');}); rebuildGlobe(); }

function selectFlight(key){
  selectedKey = key;
  var entry = flights.map(function(f,i){return {f:f,k:flightKey(f,i)};}).filter(function(x){return x.k===key;})[0];
  Array.prototype.forEach.call(document.querySelectorAll('#recent li'), function(li){ li.classList.toggle('sel', li.dataset.key===key); });
  rebuildGlobe();
  if(entry){
    var o=aptLL(entry.f.origin), d=aptLL(entry.f.destination);
    if(o&&d && globe) globe.pointOfView({ lat:(o[0]+d[0])/2, lng:(o[1]+d[1])/2, altitude:1.7 }, 900);
    var dt=$('detail'); dt.style.display='block'; dt.innerHTML=detailHTML(entry.f);
  }
}

function render(d){
  coordMap = d.coords || {};
  $('cs').textContent = d.callsign || '—';
  var on = d.live && d.live.active; $('dot').className='live-dot'+(on?' on':''); if($('dot2'))$('dot2').className='live-dot'+(on?' on':'');
  $('s-flights').textContent = d.stats.flights;
  $('s-airports').textContent = d.stats.airportsVisited;
  $('s-acc').textContent = d.stats.avgReadbackAccuracy==null ? '—' : d.stats.avgReadbackAccuracy+'%';
  $('s-emerg').textContent = d.stats.emergencies;

  var lb = $('livebar');
  if(on && d.live.pos){ var p=d.live.pos;
    lb.innerHTML = esc(d.live.origin)+' &#8594; '+esc(d.live.destination)+'<br>AC <b>'+esc(d.live.aircraft)+'</b> · ATC <b>'+esc(d.live.controller)+
      '</b><br>ALT <b>'+Math.round(p.altFt)+'</b> ft · GS <b>'+Math.round(p.gsKt)+'</b> kt · HDG <b>'+Math.round(p.hdg)+'</b>°';
  } else { lb.innerHTML = 'No active flight — open a flight in MSFS with the app running.'; }

  var maxct = Math.max.apply(null, d.stats.topRoutes.map(function(r){return r.count;}).concat([1]));
  var ru = $('routes');
  ru.innerHTML = d.stats.topRoutes.length
    ? d.stats.topRoutes.map(function(r){ return '<li data-route="'+esc(r.route)+'"><div style="flex:1"><span class="route">'+esc(r.route)+'</span><div class="bar" style="width:'+Math.round(r.count/maxct*100)+'%"></div></div><span class="ct">'+r.count+'×</span></li>'; }).join('')
    : '<li class="empty">No flights yet.</li>';
  Array.prototype.forEach.call(ru.querySelectorAll('li[data-route]'), function(li){ li.addEventListener('click', function(){
    var rt=li.dataset.route; var idx=flights.map(function(f,i){return {k:f.origin+'-'+f.destination,i:i,f:f};}).filter(function(x){return x.k===rt;})[0];
    if(idx) selectFlight(flightKey(idx.f, idx.i));
  }); });

  flights = d.recent || [];
  var tb = $('recent');
  if(flights.length){
    tb.innerHTML = flights.map(function(e,i){ var acc=e.readbackAccuracy;
      return '<li data-key="'+esc(flightKey(e,i))+'"><span class="cs2">'+esc(e.callsign)+'</span>'+
        '<span class="rt2">'+esc(e.origin)+'→'+esc(e.destination)+'</span>'+
        '<span class="badge '+accClass(acc||0)+'">'+(acc!=null?acc+'%':'n/a')+'</span>'+
        (e.declaredEmergency?'<span class="emoji" title="emergency">⚠️</span>':'')+'</li>';
    }).join('');
    Array.prototype.forEach.call(tb.querySelectorAll('li'), function(li){ li.addEventListener('click', function(){ selectFlight(li.dataset.key); }); });
  } else { tb.innerHTML = '<li class="empty">No flights logged yet. Fly and save to your logbook.</li>'; }

  rebuildGlobe();
  if(selectedKey){ var still=flights.some(function(f,i){return flightKey(f,i)===selectedKey;}); if(!still) clearSel(); }
}

function refresh(){ fetch('/api/dashboard').then(function(r){return r.json();}).then(render).catch(function(){}); }
window.addEventListener('load', function(){ if(typeof Globe!=='undefined'){ initGlobe(); } refresh(); setInterval(refresh, 5000); });
</script>
</body>
</html>
